# MX2 Gateway Daemon Configuration File
# Standard Unix INI Format

[daemon]
port = 8000
host = 127.0.0.1
smtp_proxy_port = 10025
imap_proxy_port = 10143
log_file = logs/mx2.log

[antispam]
quota_limit = 100
reputable_domains = github.com,google.com,utrecht-uni.nl,trusted.nl,trusted.com
database_path = storage/spam_db.json
